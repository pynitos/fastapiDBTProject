name: dbt-user
version: "3.9"

networks:
  user_backend_nw:
    driver: bridge

volumes:
  postgres-user-ms-data:
    driver: local

services:
  db-user:
    image: postgres:latest
    container_name: db-user
    env_file:
      - ../user_ms.env
    restart: always
    ports:
      - "15432:5432"
    healthcheck:
        test: [ "CMD", "pg_isready", "-U", "$${POSTGRES_USER}", "-d", "$${POSTGRES_NAME}" ]
        interval: 5s
        timeout: 5s
        retries: 5
    volumes:
      - postgres-user-ms-data:/var/lib/postgresql/data'
    networks:
      user_backend_nw:
    